global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Monitoring de Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitoring des conteneurs Docker via cAdvisor
  - job_name: 'docker'
    static_configs:
      - targets: ['cadvisor:8080']

  # Monitoring de l'application app1
  - job_name: 'app1'
    metrics_path: '/metrics'
    static_configs:
      - targets:
        - 'app1:5000'
        - 'app1:5000'
        - 'app1:5000'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '([^:]+):.*'
        replacement: '${1}'

  # Monitoring de l'application app2
  - job_name: 'app2'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app2:5000']