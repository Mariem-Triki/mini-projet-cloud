name: CI/CD Pipeline with Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Docker Buildx (pour multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Se connecter à Docker Hub avec les secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Builder et pousser l'image app1
      - name: Build and push app1
        uses: docker/build-push-action@v5
        with:
          context: ./app1
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app1:latest
            ${{ secrets.DOCKER_USERNAME }}/app1:${{ github.sha }}

      # 5. Builder et pousser l'image app2
      - name: Build and push app2
        uses: docker/build-push-action@v5
        with:
          context: ./app2
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app2:latest
            ${{ secrets.DOCKER_USERNAME }}/app2:${{ github.sha }}

      # 6. Vérifier que les images sont bien créées
      - name: List images
        run: docker images

  test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # 1. Récupérer le code source (pour le fichier nginx.conf)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Pull des images depuis Docker Hub
      - name: Pull images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/app1:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/app2:latest

      # 3. Créer un fichier docker-compose pour les tests
      - name: Create test docker-compose file
        run: |
          cat > docker-compose.test.yml << 'EOF'
          services:
            db:
              image: postgres:14
              environment:
                POSTGRES_DB: tasks
                POSTGRES_USER: admin
                POSTGRES_PASSWORD: admin
              networks:
                - app-network

            redis:
              image: redis:alpine
              networks:
                - app-network

            app1:
              image: ${{ secrets.DOCKER_USERNAME }}/app1:latest
              expose:
                - "5000"
              depends_on:
                - db
                - redis
              environment:
                DATABASE_URL: postgresql://admin:admin@db/tasks
                REDIS_URL: redis://redis:6379
              networks:
                - app-network
              deploy:
                mode: replicated
                replicas: 3

            app2:
              image: ${{ secrets.DOCKER_USERNAME }}/app2:latest
              expose:
                - "5000"
              depends_on:
                - redis
              environment:
                REDIS_URL: redis://redis:6379
              networks:
                - app-network

            nginx:
              image: nginx:latest
              volumes:
                - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
              ports:
                - "80:80"
              depends_on:
                - app1
                - app2
              networks:
                - app-network

          networks:
            app-network:
              driver: bridge
          EOF

      # 4. Démarrer les conteneurs
      - name: Start Docker Compose
        run: |
          docker compose -f docker-compose.test.yml up -d
          sleep 15

      # 5. Tester tous les endpoints
      - name: Test API endpoints
        run: |
          echo "=== Testing Nginx ==="
          curl -f http://localhost/ || exit 1
          
          echo "=== Testing App1 ==="
          curl -f http://localhost/app1/ || exit 1
          curl -f http://localhost/app1/tasks || exit 1
          curl -f http://localhost/app1/visits || exit 1
          
          echo "=== Testing App2 ==="
          curl -f http://localhost/app2/ || exit 1
          curl -f http://localhost/app2/visits || exit 1
          curl -f http://localhost/app2/info || exit 1
          
          echo "========================================="
          echo "✅ All tests passed successfully!"
          echo "========================================="

      # 6. Arrêter et nettoyer les conteneurs
      - name: Stop Docker Compose
        run: docker compose -f docker-compose.test.yml down

      # 7. Nettoyer les images (optionnel)
      - name: Clean up
        run: |
          docker system prune -f