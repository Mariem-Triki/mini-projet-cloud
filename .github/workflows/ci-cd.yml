name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build et push de l'image app1
      - name: Build and push app1
        uses: docker/build-push-action@v5
        with:
          context: ./app1
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app1:latest
            ${{ secrets.DOCKER_USERNAME }}/app1:${{ github.sha }}

      # 5. Build et push de l'image app2
      - name: Build and push app2
        uses: docker/build-push-action@v5
        with:
          context: ./app2
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app2:latest
            ${{ secrets.DOCKER_USERNAME }}/app2:${{ github.sha }}

      # 6. Vérifier les images
      - name: List images
        run: docker images

  test:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env

      - name: Start Docker Compose with built images
        run: |
          # Modifier docker-compose.yml pour utiliser les images poussées
          sed -i 's|build: ./app1|image: ${{ secrets.DOCKER_USERNAME }}/app1:latest|g' docker-compose.yml
          sed -i 's|build: ./app2|image: ${{ secrets.DOCKER_USERNAME }}/app2:latest|g' docker-compose.yml
          docker compose up -d
          sleep 15

      - name: Test API endpoints
        run: |
          # Tester la page d'accueil
          curl -f http://localhost/ || exit 1
          
          # Tester app1
          curl -f http://localhost/app1/ || exit 1
          curl -f http://localhost/app1/tasks || exit 1
          curl -f http://localhost/app1/visits || exit 1
          
          # Tester app2
          curl -f http://localhost/app2/ || exit 1
          curl -f http://localhost/app2/visits || exit 1
          curl -f http://localhost/app2/info || exit 1
          
          echo "✅ All tests passed!"

      - name: Stop Docker Compose
        run: docker compose down