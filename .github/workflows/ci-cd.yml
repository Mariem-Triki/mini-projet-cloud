name: CI/CD Pipeline with Docker Hub

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Configurer Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Se connecter à Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Builder et pousser l'image app1
      - name: Build and push app1
        uses: docker/build-push-action@v5
        with:
          context: ./app1
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app1:latest
            ${{ secrets.DOCKER_USERNAME }}/app1:${{ github.sha }}

      # 5. Builder et pousser l'image app2
      - name: Build and push app2
        uses: docker/build-push-action@v5
        with:
          context: ./app2
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/app2:latest
            ${{ secrets.DOCKER_USERNAME }}/app2:${{ github.sha }}

      # 6. Vérifier les images
      - name: List images
        run: |
          echo "========================================="
          echo "Images built and pushed successfully!"
          echo "========================================="
          docker images
          echo ""
          echo "✅ Images disponibles sur Docker Hub:"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/app1:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/app2:latest"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/app1:${{ github.sha }}"
          echo "   - ${{ secrets.DOCKER_USERNAME }}/app2:${{ github.sha }}"